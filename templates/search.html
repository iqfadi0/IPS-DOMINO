<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search Customer</title>
</head>
<body>
  <h2>Search Customer by Name</h2>
  <form method="POST">
    <input type="text" name="name" placeholder="Enter customer name" required autofocus />
    <button type="submit">Search</button>
  </form>

  {% if result %}
    {% if result is string %}
      <p style="color:red;">{{ result }}</p>
    {% else %}
      <h3>Customer Details:</h3>
      <ul>
        <li><strong>Name:</strong> {{ result.name }}</li>
        <li><strong>Start Date:</strong> {{ result.start_date }}</li>
        <li><strong>End Date:</strong> {{ result.end_date }}</li>
      </ul>
    {% endif %}
  {% endif %}
  <br>
  <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
