<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login</title>
<style>
  body { font-family: Arial, sans-serif; background: #f7f7f7; display: flex; height: 100vh; justify-content: center; align-items: center; }
  .container { background: white; padding: 20px 30px; border-radius: 8px; box-shadow: 0 0 10px #ccc; width: 300px; }
  input[type=password] { width: 100%; padding: 10px; margin-top: 10px; border-radius: 4px; border: 1px solid #ccc; }
  button { margin-top: 15px; width: 100%; padding: 10px; border:none; background: #007BFF; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; }
  button:hover { background: #0056b3; }
  .error { color: red; margin-top: 10px; }
  h2 { text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h2>Login</h2>
  <form method="POST">
    <input type="password" name="password" placeholder="Enter Password" required autofocus />
    <button type="submit">Login</button>
  </form>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
</div>
</body>
</html>
