<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login</title>
<style>
  body { font-family: Arial, sans-serif; background:#222; color:#eee; display:flex; justify-content:center; align-items:center; height:100vh; }
  .login-box { background:#333; padding:30px; border-radius:8px; width:300px; }
  input[type=password] { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:none; }
  button { width:100%; padding:10px; background:#4caf50; border:none; color:#fff; font-weight:bold; cursor:pointer; border-radius:6px; }
  .error { color:#ff6666; margin-bottom:10px; }
</style>
</head>
<body>
<div class="login-box">
  <h2>Login</h2>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Enter Password" required autofocus />
    <button type="submit">Login</button>
  </form>
</div>
</body>
</html>
