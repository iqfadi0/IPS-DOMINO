<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Login</title></head>
<body>
  <h2>Login</h2>
  {% if error %}
  <p style="color:red;">{{ error }}</p>
  {% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
</body>
</html>
