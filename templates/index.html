<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Maintenance</title>
  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: #1e1e1e;
      padding: 40px 50px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      width: 320px;
      text-align: center;
    }
    h2 {
      margin-bottom: 25px;
      font-weight: 700;
      letter-spacing: 1.2px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 20px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      background: #2c2c2c;
      color: #fff;
      outline: none;
      transition: background 0.3s ease;
    }
    input[type="password"]:focus {
      background: #3a3a3a;
    }
    button {
      width: 100%;
      padding: 12px 0;
      background: #3a86ff;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #265ebf;
    }
    .error {
      color: #ff4b5c;
      margin-bottom: 15px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login - Maintenance</h2>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Enter Password" required />
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
