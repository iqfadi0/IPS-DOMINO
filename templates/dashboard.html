<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    padding: 20px;
    direction: rtl;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 15px;
  }
  h1 {
    margin: 0;
    font-size: 1.8rem;
  }
  .logout {
    background-color: #dc3545;
    color: white;
    padding: 10px 15px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
  }
  form.search-form, form.add-form {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  input[type=text] {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    flex: 1 1 250px;
    font-size: 1rem;
  }
  button {
    padding: 10px 20px;
    border: none;
    background: #28a745;
    color: white;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 1rem;
    min-width: 100px;
  }
  button:hover {
    background: #218838;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    font-size: 0.9rem;
  }
  th, td {
    padding: 12px 10px;
    border: 1px solid #ccc;
    text-align: right;
  }
  th {
    background: #343a40;
    color: white;
  }
  a.edit-btn, a.delete-btn {
    padding: 7px 12px;
    border-radius: 6px;
    color: white;
    text-decoration: none;
    font-size: 0.85rem;
    margin-left: 6px;
  }
  a.edit-btn {
    background: #007bff;
  }
  a.delete-btn {
    background: #dc3545;
  }
  a.edit-btn:hover {
    background: #0056b3;
  }
  a.delete-btn:hover {
    background: #b02a37;
  }
  @media (max-width: 600px) {
    .top-bar {
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
    }
    form.search-form, form.add-form {
      flex-direction: column;
      gap: 10px;
    }
    input[type=text], button {
      flex: 1 1 100%;
      min-width: auto;
    }
    table, thead, tbody, th, td, tr {
      display: block;
      width: 100%;
    }
    thead tr {
      display: none;
    }
    tbody tr {
      margin-bottom: 15px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 8px #ccc;
      padding: 15px;
    }
