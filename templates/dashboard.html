<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customer Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #141E30, #243B55);
      color: #fff;
    }
    .container {
      max-width: 500px;
      margin: 30px auto;
      padding: 20px;
      background-color: #1c1c1c;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 20px;
    }
    input[type="text"], input[type="password"], input[type="submit"], button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }
    input[type="text"], input[type="password"] {
      background-color: #2e2e2e;
      color: white;
    }
    input[type="submit"], button {
      background-color: #f2d057;
      color: black;
      font-weight: bold;
    }
    .btn-delete {
      background-color: red;
      color: white;
    }
    .customer {
      background-color: #2e2e2e;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }
    .logout {
      background-color: #444;
      text-align: center;
      margin-top: 20px;
      padding: 10px;
      border-radius: 10px;
    }
    @media (max-width: 600px) {
      .container {
        margin: 15px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Customer Dashboard</h1>

    <!-- Search Section -->
    <form action="/dashboard" method="POST">
      <label>Search by Customer Name</label>
      <input type="text" name="search_name" placeholder="Type name..." />
      <input type="submit" value="Search" />
    </form>

    <!-- Add / Update Customer -->
    <form action="/add_customer" method="POST">
      <label>Customer Name</label>
      <input type="text" name="customer_name" required placeholder="Enter name" />
      <input type="submit" value="Add Customer" />
    </form>

    <!-- List of Customers -->
    {% for customer in customers %}
      <div class="customer">
        <strong>{{ customer.name }}</strong><br>
        Added: {{ customer.added_date }}<br>
        Expires: {{ customer.expiry_date }}<br>
        {% if is_admin %}
          <form action="/delete_customer" method="POST">
            <input type="hidden" name="customer_name" value="{{ customer.name }}">
            <input type="submit" value="Delete" class="btn-delete">
          </form>
        {% endif %}
      </div>
    {% endfor %}

    <!-- Logout -->
    <div class="logout">
      <form action="/logout" method="POST">
        <input type="submit" value="Logout">
      </form>
    </div>
  </div>
</body>
</html>
