<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dashboard</title>
<style>
  body { font-family: Arial, sans-serif; background: #f7f7f7; padding: 20px; }
  h1 { margin-bottom: 20px; }
  form { margin-bottom: 20px; }
  input[type=text] { padding: 8px; width: 250px; border-radius: 4px; border: 1px solid #ccc; }
  button { padding: 8px 15px; border:none; background: #28a745; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; }
  button:hover { background: #218838; }
  table { width: 100%; border-collapse: collapse; background: white; }
  th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
  th { background: #343a40; color: white; }
  a { text-decoration: none; padding: 5px 10px; border-radius: 4px; }
  .edit-btn { background: #007bff; color: white; }
  .delete-btn { background: #dc3545; color: white; }
  .logout { float: right; margin-bottom: 10px; }
</style>
</head>
<body>

<div>
  <a href="{{ url_for('logout') }}" class="logout">Logout</a>
  <h1>Customer Maintenance Dashboard</h1>
</div>

<form method="GET" action="{{ url_for('dashboard') }}">
  <input type="text" name="search_name" placeholder="Search by name" value="{{ search_name|default('') }}">
  <button type="submit">Search</button>
</form>

{% if role in ['admin', 'user'] %}
<form method="POST" style="margin-bottom:20px;">
  <input type="text" name="name" placeholder="Customer Name" required>
  <button type="submit">Add Customer</button>
</form>
{% endif %}

<table>
  <thead>
    <tr>
      <th>ID</th><th>Name</th><th>Start Date</th><th>End Date</th><th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for c in customers %}
    <tr>
      <td>{{ c[0] }}</td>
      <td>{{ c[1] }}</td>
      <td>{{ c[2] }}</td>
      <td>{{ c[3] }}</td>
      <td>
        <a href="{{ url_for('edit', id=c[0]) }}" class="edit-btn">Edit</a>
        {% if role == 'admin' %}
        <a href="{{ url_for('delete', id=c[0]) }}" class="delete-btn" onclick="return confirm('Are you sure?')">Delete</a>
        {% endif %}
      </td>
    </tr>
    {% else %}
    <tr><td colspan="5">No customers found.</td></tr>
    {% endfor %}
  </tbody>
</table>

</body>
</html>
